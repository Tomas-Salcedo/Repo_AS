version: "3.9"

services:
  # ========================================
  # API GATEWAY - TRAEFIK
  # ========================================
  traefik:
    image: traefik:v2.10
    container_name: traefik
    ports:
      - "80:80"      # Puerto HTTP principal
      - "8888:8080"  # Dashboard de Traefik
    volumes:
      - ./apigateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./apigateway/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
    restart: always

  # ========================================
  # RABBITMQ (FALTABA ESTE SERVICIO!)
  # ========================================
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"   # Puerto AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # SERVICIO DE AUTENTICACIÓN
  # ========================================
  authentication-service:
    build:
      context: ./autenticacion
      dockerfile: autenticacion.dockerfile
    container_name: authentication
    ports:
      - "8081:8081"
    environment:
      MONGO_DB_URL: mongodb://tomas:12345@host.docker.internal:27017/proyecto?authSource=proyecto
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    restart: always
    depends_on:
      - traefik
    
  # ========================================
  # SERVICIO FRONTEND
  # ========================================
  frontend-service:
    build:
      context: ./front
      dockerfile: front.dockerfile
    container_name: frontend
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: "http://authentication-service:8081"
      RABBITMQ_URL: "amqp://admin:admin123@rabbitmq:5672/"
    depends_on:
      - authentication-service
      - traefik
      - rabbitmq  # 👈 Espera a que RabbitMQ esté listo
    networks:
      - backend
    restart: always

  # ========================================
  # SERVICIO DE PEDIDOS (CONSUMIDOR)
  # ========================================
  pedido-service:
    build:
      context: ./pedido
      dockerfile: pedido.dockerfile
    container_name: pedido
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_USER: tu_usuario
      DB_PASSWORD: tu_password
      DB_NAME: tu_database
      RABBITMQ_URL: "amqp://admin:admin123@rabbitmq:5672/"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy  # 👈 Espera a que RabbitMQ esté saludable

# ========================================
# VOLÚMENES (FALTABA ESTA SECCIÓN!)
# ========================================
volumes:
  rabbitmq_data:

networks:
  backend:
    driver: bridge