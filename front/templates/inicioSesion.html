<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="width: 22rem;">
            <h3 class="text-center mb-4">Iniciar sesión</h3>

            <!-- 🚨 ALERTA si las credenciales son incorrectas -->
            {{ if .Error }}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                Usuario o contraseña incorrectos.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {{ end }}

            <form action="/index/inicioSesion/enviar" method="POST">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>

            <!-- 🔹 Línea divisoria -->
            <div class="text-center my-3 text-muted">— o —</div>

            <!-- 🔹 Botón Google -->
            <a href="https://mi-proyecto-auth.onrender.com/autenticacion/google"
                class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
                <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google logo" width="20" height="20"
                    class="me-2">
                Iniciar con Google
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
