<!-- editar_perfil.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"> <!-- Agregado para icons -->
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/index/principal">Mi Supermercado</a>
            <div class="d-flex gap-2">
                <a href="/index/principal" class="btn btn-outline-secondary btn-sm">Volver</a>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="container flex-grow-1 py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Editar Perfil</h3>

                        <!-- Alerta de éxito -->
                        {{if .Exito}}
                        <div class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            {{.Exito}}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {{end}}

                        <!-- Alerta de error -->
                        {{if .Error}}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            {{.Error}}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {{end}}

                        <form action="/index/perfilEditado" method="POST">
                            <!-- Username -->
                            <div class="mb-3">
                                <label for="username" class="form-label">Nombre de usuario Nuevo</label>
                                <input type="text" class="form-control" id="username" name="username"
                                 placeholder="Ingresa tu nombre de usuario" required>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico Nuevo</label>
                                <input type="email" class="form-control" id="email" name="email"
                                 placeholder="usuario@ejemplo.com" required>
                            </div>

                            <!-- Contraseña nueva -->
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña Nueva</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="********">
                            </div>

                            <!-- Botones -->
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">Guardar cambios</button>
                                <a href="/index/principal" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>


    <!-- Footer -->
    <footer class="bg-white text-center py-3 border-top mt-auto">
        <div class="container">
            <small class="text-muted">© 2025 Mi Supermercado - Todos los derechos reservados</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
